# Render Blueprint — deploys backend + PostgreSQL database in one click
# Go to: https://dashboard.render.com/blueprints → New Blueprint → connect repo

services:
  # ─── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: cyberplayground-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cyberplayground-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true          # Render auto-generates a secure value
      - key: CLIENT_URL
        sync: false                  # Set manually after deploying client
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_PLAN_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: cyberplayground-db
    databaseName: cyberplayground
    user: cyberplayground
    plan: free
